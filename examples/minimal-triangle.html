<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Kanizsa Triangle</title>
<style>
  html,body { margin:0; height:100%; background:#eaeaea; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; }
  p { position:fixed; left:12px; bottom:10px; margin:0;
      font:12px ui-monospace,monospace; color:#666; }
</style>
</head>
<body>
<!-- The smallest self-contained Kanizsa triangle: one fullscreen fragment
     shader, no modules, no fetch — so it runs straight from file:// too.
     The full project (../index.html) splits this into passes and adds the
     other shapes, filling-in diffusion, and controls. -->
<canvas id="c"></canvas>
<p>minimal Kanizsa triangle — three pac-men, one fragment shader</p>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2');
if (!gl) document.body.innerHTML = '<p>WebGL2 not available.</p>';

const VERT = `#version 300 es
precision highp float;
layout(location=0) in vec2 a; out vec2 uv;
void main(){ uv = a*0.5+0.5; gl_Position = vec4(a,0.,1.); }`;

const FRAG = `#version 300 es
precision highp float;
out vec4 o; in vec2 uv;
uniform vec2 res;
const float PI = 3.14159265;

float angDiff(float a, float b){ float d=a-b; return atan(sin(d),cos(d)); }

// pac-man ink: disk of radius r with a wedge (half-angle w) removed toward 'face'
float pac(vec2 p, vec2 c, float face, float r, float w){
  vec2 q = p-c; float d = length(q);
  float aa = fwidth(d)+1e-4;
  float disk = 1.-smoothstep(r-aa, r+aa, d);
  float rel = abs(angDiff(atan(q.y,q.x), face));
  float aaA = fwidth(rel)+1e-3;
  return disk * smoothstep(w-aaA, w+aaA, rel);
}

// signed distance to the triangle through verts v0,v1,v2 (negative inside)
float sdTri(vec2 p, vec2 v0, vec2 v1, vec2 v2){
  vec2 e0=v1-v0, e1=v2-v1, e2=v0-v2;
  vec2 p0=p-v0, p1=p-v1, p2=p-v2;
  vec2 d0=p0-e0*clamp(dot(p0,e0)/dot(e0,e0),0.,1.);
  vec2 d1=p1-e1*clamp(dot(p1,e1)/dot(e1,e1),0.,1.);
  vec2 d2=p2-e2*clamp(dot(p2,e2)/dot(e2,e2),0.,1.);
  float s = sign(e0.x*e2.y - e0.y*e2.x);
  vec2 d = min(min(
    vec2(dot(d0,d0), s*(p0.x*e0.y-p0.y*e0.x)),
    vec2(dot(d1,d1), s*(p1.x*e1.y-p1.y*e1.x))),
    vec2(dot(d2,d2), s*(p2.x*e2.y-p2.y*e2.x)));
  return -sqrt(d.x)*sign(d.y);
}

void main(){
  float aspect = res.x/res.y;
  vec2 p = uv*2.-1.; p.x *= aspect;

  // three triangle vertices (apex up), inducers sit on them
  float R = 0.55;
  vec2 v0 = R*vec2(cos(radians(90.)),  sin(radians(90.)));
  vec2 v1 = R*vec2(cos(radians(210.)), sin(radians(210.)));
  vec2 v2 = R*vec2(cos(radians(330.)), sin(radians(330.)));

  // each mouth opens toward the centroid (origin); wedge half-angle = 30°
  float r = 0.34, w = radians(30.);
  float ink = max(max(
      pac(p, v0, atan(-v0.y,-v0.x), r, w),
      pac(p, v1, atan(-v1.y,-v1.x), r, w)),
      pac(p, v2, atan(-v2.y,-v2.x), r, w));

  float bg = 0.92;
  vec3 col = vec3(mix(bg, 0.04, ink));     // dark pac-men on light grey

  // subjective surface: lift the triangle interior above the background
  float sd = sdTri(p, v0, v1, v2);
  float inside = 1.0 - smoothstep(0.0, 0.01, sd);
  col += inside * (1.0 - ink) * 0.18;       // brighter-than-background fill

  o = vec4(clamp(col,0.,1.), 1.);
}`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src);
  gl.compileShader(s); if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))
  throw gl.getShaderInfoLog(s); return s; }
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog); gl.useProgram(prog);

const vao = gl.createVertexArray(); gl.bindVertexArray(vao);
gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const resLoc = gl.getUniformLocation(prog, 'res');
function resize(){ const d=Math.min(devicePixelRatio||1,2);
  canvas.width=innerWidth*d; canvas.height=innerHeight*d;
  gl.viewport(0,0,canvas.width,canvas.height); draw(); }
function draw(){ gl.uniform2f(resLoc, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4); }
addEventListener('resize', resize); resize();
</script>
</body>
</html>
